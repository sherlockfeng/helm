<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .nav { display: flex; flex-direction: column; gap: 1px; background: var(--bg-sidebar); padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); width: 220px;}
  .group { font: 600 11px/14px var(--font-sans); color: var(--text-secondary); text-transform: uppercase; letter-spacing:0.08em; padding: 10px 10px 4px;}
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; height: 28px;
    border-radius: 6px; color: var(--text-secondary);
    font: 500 13px/16px var(--font-sans); cursor: pointer;
  }
  .row svg { color: var(--text-secondary); flex-shrink: 0; }
  .row:hover { background: var(--hover); color: var(--text); }
  .row:hover svg { color: var(--text); }
  .row.active { background: var(--selected); color: var(--selected-text); }
  .row.active svg { color: var(--selected-text); }
  .count { margin-left: auto; font: 500 11px/14px var(--font-mono); color: var(--text-tertiary); }
  .row.active .count { color: var(--selected-text); }
  body { padding: 10px; }
</style></head>
<body>
<div style="display:flex; gap: 12px;">
<div class="nav">
  <div class="group">CHATS</div>
  <div class="row active">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2z"/><path d="M18 9h1a2 2 0 0 1 2 2v10l-4-4h-5a2 2 0 0 1-2-2v-1"/></svg>
    Active <span class="count">3</span>
  </div>
  <div class="row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Bindings <span class="count">7</span>
  </div>
  <div class="row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    Approvals <span class="count">2</span>
  </div>
</div>
<div class="nav">
  <div class="group">KNOWLEDGE</div>
  <div class="row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Roles
  </div>
  <div class="row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><circle cx="12" cy="11" r="3"/><circle cx="12" cy="2" r="0"/><path d="M20 22H4"/><circle cx="12" cy="2" r="0"/></svg>
    Subscriptions
  </div>
  <div class="row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6"/><path d="M15 2v6"/><path d="M12 17v5"/><path d="M5 8h14l-1 6a4 4 0 0 1-4 3h-4a4 4 0 0 1-4-3z"/></svg>
    Plugins
  </div>
</div>
</div>
</body></html>
