<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { align-items: flex-end; gap: 14px; }
  .col { align-items: center; gap: 6px; }
  .box { background: var(--accent); border-radius: 3px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="width:4px;height:4px;"></div><div class="lbl">1</div><div class="px">4</div></div>
  <div class="col"><div class="box" style="width:8px;height:8px;"></div><div class="lbl">2</div><div class="px">8</div></div>
  <div class="col"><div class="box" style="width:12px;height:12px;"></div><div class="lbl">3</div><div class="px">12</div></div>
  <div class="col"><div class="box" style="width:16px;height:16px;"></div><div class="lbl">4</div><div class="px">16</div></div>
  <div class="col"><div class="box" style="width:20px;height:20px;"></div><div class="lbl">5</div><div class="px">20</div></div>
  <div class="col"><div class="box" style="width:28px;height:28px;"></div><div class="lbl">6</div><div class="px">28</div></div>
  <div class="col"><div class="box" style="width:40px;height:40px;"></div><div class="lbl">8</div><div class="px">40</div></div>
  <div class="col"><div class="box" style="width:56px;height:56px;"></div><div class="lbl">10</div><div class="px">56</div></div>
  <div class="col"><div class="box" style="width:80px;height:80px;"></div><div class="lbl">12</div><div class="px">80</div></div>
</div>
</body></html>
