<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .specimen { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; }
  .lbl { width: 96px; font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
  .meta { margin-left: auto; font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="specimen">
    <div class="lbl">display</div>
    <div style="font: 600 28px/32px var(--font-sans); color: var(--text); letter-spacing:-0.01em;">Nothing waiting.</div>
    <div class="meta">28 / 32 · 600</div>
  </div>
  <div class="specimen">
    <div class="lbl">h1</div>
    <div style="font: 600 22px/28px var(--font-sans); color: var(--text); letter-spacing:-0.005em;">Approvals</div>
    <div class="meta">22 / 28 · 600</div>
  </div>
  <div class="specimen">
    <div class="lbl">h2</div>
    <div style="font: 600 17px/22px var(--font-sans); color: var(--text);">Pending approvals</div>
    <div class="meta">17 / 22 · 600</div>
  </div>
  <div class="specimen">
    <div class="lbl">h3</div>
    <div style="font: 600 13px/16px var(--font-sans); color: var(--text-secondary); text-transform: uppercase; letter-spacing:0.08em;">CHATS</div>
    <div class="meta">13 / 16 · 600 caps</div>
  </div>
</body></html>
