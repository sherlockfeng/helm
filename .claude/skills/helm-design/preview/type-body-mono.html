<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .specimen { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; }
  .lbl { width: 96px; font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
  .meta { margin-left: auto; font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="specimen">
    <div class="lbl">body</div>
    <div style="font: 400 13px/18px var(--font-sans); color: var(--text);">helm injects role knowledge when a chat starts.</div>
    <div class="meta">13 / 18 · 400</div>
  </div>
  <div class="specimen">
    <div class="lbl">caption</div>
    <div style="font: 400 11px/14px var(--font-sans); color: var(--text-secondary);">requested 4 s ago · expires in 26 s</div>
    <div class="meta">11 / 14 · 400</div>
  </div>
  <div class="specimen">
    <div class="lbl">mono</div>
    <div style="font: 400 12px/16px var(--font-mono); color: var(--text);">git push origin main --force-with-lease</div>
    <div class="meta">12 / 16 · SF Mono</div>
  </div>
  <div class="specimen">
    <div class="lbl">num · tabular</div>
    <div style="font: 600 22px/28px var(--font-sans); color: var(--text); font-variant-numeric: tabular-nums;">12&nbsp;·&nbsp;3&nbsp;·&nbsp;90 d</div>
    <div class="meta">tabular-nums</div>
  </div>
</body></html>
