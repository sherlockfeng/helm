<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { gap: 24px; align-items: flex-end; }
  .col { align-items: center; gap: 8px; }
  .swab { width: 80px; height: 60px; background: var(--bg-elev); border: 1px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body>
<div class="row">
  <div class="col"><div class="swab" style="border-radius: 6px;"></div><div class="lbl">--radius-sm</div><div class="px">6 px</div></div>
  <div class="col"><div class="swab" style="border-radius: 10px;"></div><div class="lbl">--radius-md</div><div class="px">10 px</div></div>
  <div class="col"><div class="swab" style="border-radius: 9999px;"></div><div class="lbl">--radius-full</div><div class="px">∞ (derived)</div></div>
</div>
</body></html>
