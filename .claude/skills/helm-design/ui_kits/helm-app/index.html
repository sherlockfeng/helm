<!doctype html>
<html lang="en" data-screen-label="helm-app · UI kit">
<head>
  <meta charset="utf-8" />
  <title>helm · UI kit</title>
  <link rel="stylesheet" href="app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="components/Icons.jsx"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="pages/ApprovalsPage.jsx"></script>
  <script type="text/babel" src="pages/ActiveChatsPage.jsx"></script>
  <script type="text/babel" src="pages/BindingsPage.jsx"></script>
  <script type="text/babel" src="pages/RolesPage.jsx"></script>
  <script type="text/babel" src="pages/SubscriptionsPage.jsx"></script>
  <script type="text/babel" src="pages/PluginsPage.jsx"></script>
  <script type="text/babel" src="pages/HarnessPage.jsx"></script>
  <script type="text/babel" src="pages/SettingsPage.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route, setRoute] = useState('approvals');
      const counts = { chats: 3, bindings: 7, approvals: 2, roles: 4, subscriptions: 3, harness: 3 };

      const Page = ({
        approvals:     ApprovalsPage,
        chats:         ActiveChatsPage,
        bindings:      BindingsPage,
        roles:         RolesPage,
        subscriptions: SubscriptionsPage,
        plugins:       PluginsPage,
        harness:       HarnessPage,
        settings:      SettingsPage,
      })[route];

      return (
        <div className="app-shell" data-screen-label={`helm · ${route}`}>
          <Sidebar route={route} onNavigate={setRoute} counts={counts} />
          <Page />
          <ToastLayer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
