<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 12px; text-align: center; }
  .glyph { color: var(--text-secondary); opacity: .55; }
  .title { font: 600 17px/22px var(--font-sans); color: var(--text); }
  .body  { font: 400 13px/18px var(--font-sans); color: var(--text-secondary); max-width: 360px; }
  .row { gap: 8px; margin-top: 6px; }
  .btn { display:inline-flex; align-items:center; gap:6px; height:28px; padding:0 12px; border-radius:6px;
         font: 500 13px/1 var(--font-sans); cursor: pointer; }
  .btn.primary { background: var(--accent); color: #fff; border: 1px solid transparent; }
  .btn.ghost   { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
</style></head>
<body>
<div class="wrap">
  <svg class="glyph" width="56" height="56" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="20" r="6"/><circle cx="20" cy="20" r="11.5"/>
    <line x1="20" y1="14" x2="20" y2="8.5"/><line x1="20" y1="26" x2="20" y2="31.5"/>
    <line x1="14" y1="20" x2="8.5" y2="20"/><line x1="26" y1="20" x2="31.5" y2="20"/>
    <line x1="15.76" y1="15.76" x2="11.87" y2="11.87"/><line x1="24.24" y1="24.24" x2="28.13" y2="28.13"/>
    <line x1="24.24" y1="15.76" x2="28.13" y2="11.87"/><line x1="15.76" y1="24.24" x2="11.87" y2="28.13"/>
    <circle cx="20" cy="20" r="1" fill="currentColor" stroke="none"/>
  </svg>
  <div class="title">Nothing waiting.</div>
  <div class="body">Approvals appear here when an agent asks before running a tool.</div>
  <div class="row">
    <button class="btn ghost">Read the docs</button>
    <button class="btn primary">Open settings</button>
  </div>
</div>
</body></html>
