<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .brand { display:flex; align-items:center; gap: 10px; padding: 18px 16px; }
  .word { font: 600 22px/1 var(--font-sans); color: var(--text); letter-spacing: -0.01em; }
  .tag { font: 500 11px/1 var(--font-mono); color: var(--text-secondary); margin-left: 8px; padding: 3px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
  .small { font: 600 14px/1 var(--font-sans); color: var(--text); }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--text-tertiary); margin-left: 8px; }
</style></head>
<body>
<div class="brand">
  <span class="word">Helm</span>
  <span class="tag">v0.79 · cockpit</span>
</div>
<div class="brand" style="padding-top: 0;">
  <span class="small">Helm</span>
  <span class="lbl">in-sidebar · 14 / 600</span>
</div>
</body></html>
