<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 18px; padding: 0 6px;
    border-radius: 4px; font: 500 11px/1 var(--font-sans);
    border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-secondary);
  }
  .badge.accent  { background: var(--surface-accent-tinted);  color: var(--accent);  border-color: rgba(0,122,255,.30); }
  .badge.success { background: var(--surface-success-tinted); color: #1d7a3a;        border-color: rgba(52,199,89,.30); }
  .badge.warn    { background: var(--surface-warn-tinted);    color: #b66700;        border-color: rgba(255,149,0,.30); }
  .badge.danger  { background: var(--surface-danger-tinted);  color: var(--danger);  border-color: rgba(255,59,48,.30); }
  .dot { width: 6px; height: 6px; border-radius: 9999px; }
  .row { gap: 8px; flex-wrap: wrap; }
</style></head>
<body>
  <div class="row">
    <span class="badge">default</span>
    <span class="badge accent">bound</span>
    <span class="badge success"><span class="dot" style="background:var(--success)"></span>synced</span>
    <span class="badge warn"><span class="dot" style="background:var(--warn)"></span>expiring</span>
    <span class="badge danger"><span class="dot" style="background:var(--danger)"></span>expired</span>
  </div>
  <div class="row" style="margin-top:10px;">
    <span class="badge">12 chunks</span>
    <span class="badge accent">3 new</span>
    <span class="badge">v0.4.2</span>
    <span class="badge warn">90 d unused</span>
  </div>
</body></html>
