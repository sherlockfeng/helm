name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      # Python 3.12 dropped `distutils`; @cursor/sdk's transitive
      # sqlite3@5.1.7 native build still imports it. Pin Python 3.11
      # on the runner so node-gyp's setuptools fallback isn't even
      # needed. (sqlite3 itself is unused at runtime — better-sqlite3
      # is helm's DB — but it ships as an optional dep we can't trim
      # without forking @cursor/sdk.)
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # R-17 — fails when an e2e/<dir>/ has spec files but no
      # attack.spec.ts (or .attack-exempt). Keeps the adversarial test
      # axis from quietly slipping in new surfaces.
      - name: Attack coverage lint
        run: node scripts/check-attack-coverage.mjs

      - name: Unit tests
        run: pnpm test:unit

      # Layer-1 UI tests: render React components in happy-dom and assert
      # behavior (no Electron). Catches the "change page A, silently break
      # page B / a control / a handler" class that tsc can't see.
      - name: Web component tests
        run: pnpm test:web

      - name: E2e tests
        run: pnpm test:e2e

      - name: Web build
        run: pnpm build:web

  # Layer-3 UI e2e: launch the REAL bundled Electron app via Playwright,
  # walk every primary page, assert nav structure + backend connectivity +
  # no JS errors, run one interactive flow, and screenshot each page. This
  # is the only suite that loads the actual compiled renderer, so it's what
  # catches white-screens / dropped routes / broken pages that neither tsc
  # nor the happy-dom component tests can see. Kept as a separate job so its
  # ~slow Electron boot + native rebuild doesn't gate the fast feedback job,
  # and its failures are isolated. Screenshots upload as an artifact for
  # eyeballing CI failures without a local re-run.
  renderer-e2e:
    name: Renderer e2e (real Electron)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Produces out/electron/main.cjs (the e2e ENTRY) + web/dist (the
      # renderer loaded via file://).
      - name: Build app
        run: pnpm build

      # electron-rebuilds better-sqlite3 to Electron's ABI, runs the
      # renderer specs, then rebuilds back to Node's ABI.
      - name: Renderer e2e
        run: pnpm test:e2e:renderer

      - name: Upload renderer screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-screenshots
          # __screenshots__ = per-page captures + visual diffs (for eyeballing
          # failures). __baselines__ = the committed visual-regression baselines;
          # uploaded too so freshly-seeded baselines can be downloaded and
          # committed on the bootstrap run.
          path: |
            tests/e2e/renderer/__screenshots__/
            tests/e2e/renderer/__baselines__/
          if-no-files-found: ignore
