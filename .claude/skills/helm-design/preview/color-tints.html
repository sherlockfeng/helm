<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.tinted-row {
  display: flex; align-items: stretch; gap: 10px;
  padding: 12px 14px; border-radius: 10px; background: var(--bg-elev);
  border: 1px solid var(--border); height: 56px;
}
.bar { width: 3px; border-radius: 2px; flex-shrink: 0; }
.label { font-weight: 500; font-size: 12px; }
.stack { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div class="stack">
  <div class="tinted-row" style="background: var(--surface-accent-tinted);">
    <div class="bar" style="background: var(--accent);"></div>
    <div class="grow"><div class="label">accent</div><div class="tiny mono muted">--surface-accent-tinted</div></div>
    <div class="tiny mono muted">rgba(0,122,255,.08)</div>
  </div>
  <div class="tinted-row" style="background: var(--surface-warn-tinted);">
    <div class="bar" style="background: var(--warn);"></div>
    <div class="grow"><div class="label">warn</div><div class="tiny mono muted">--surface-warn-tinted</div></div>
    <div class="tiny mono muted">rgba(255,149,0,.10)</div>
  </div>
  <div class="tinted-row" style="background: var(--surface-success-tinted);">
    <div class="bar" style="background: var(--success);"></div>
    <div class="grow"><div class="label">success</div><div class="tiny mono muted">--surface-success-tinted</div></div>
    <div class="tiny mono muted">rgba(52,199,89,.10)</div>
  </div>
  <div class="tinted-row" style="background: var(--surface-danger-tinted);">
    <div class="bar" style="background: var(--danger);"></div>
    <div class="grow"><div class="label">danger</div><div class="tiny mono muted">--surface-danger-tinted</div></div>
    <div class="tiny mono muted">rgba(255,59,48,.08)</div>
  </div>
</div>
</body></html>
