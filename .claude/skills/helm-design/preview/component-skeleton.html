<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .card {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; max-width: 480px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .skel { background: linear-gradient(90deg, var(--hover) 0%, var(--bg) 50%, var(--hover) 100%);
    background-size: 200% 100%; animation: sh 1.4s linear infinite; border-radius: 4px; }
  @keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .row { gap: 10px; align-items: center; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  @media (prefers-reduced-motion: reduce) { .skel { animation: none; } }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="skel" style="width:14px;height:14px;border-radius:9999px;"></div><div class="skel" style="height:14px;width:140px;"></div><div class="skel" style="margin-left:auto;height:14px;width:48px;"></div></div>
  <div class="row"><div class="skel" style="height:10px;width:100%;"></div></div>
  <div class="row"><div class="skel" style="height:10px;width:72%;"></div></div>
  <div class="row" style="margin-top:14px;"><div class="skel" style="height:24px;width:64px;"></div><div class="skel" style="height:24px;width:64px;"></div><div class="skel" style="margin-left:auto;height:14px;width:80px;"></div></div>
</div>
</body></html>
