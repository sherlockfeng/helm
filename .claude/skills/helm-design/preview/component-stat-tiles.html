<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile {
    padding: 12px 14px; background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  }
  .lbl { font: 600 11px/14px var(--font-sans); color: var(--text-secondary); text-transform: uppercase; letter-spacing:0.08em; }
  .num { font: 600 24px/28px var(--font-sans); color: var(--text); font-variant-numeric: tabular-nums; margin-top: 4px; }
  .delta { font: 500 11px/14px var(--font-sans); margin-top: 2px; }
  .delta.up { color: var(--success); }
  .delta.warn { color: var(--warn); }
  .delta.muted { color: var(--text-tertiary); }
</style></head>
<body>
<div class="grid">
  <div class="tile"><div class="lbl">Active chats</div><div class="num">3</div><div class="delta muted">+1 today</div></div>
  <div class="tile"><div class="lbl">Pending</div><div class="num">2</div><div class="delta warn">1 expiring</div></div>
  <div class="tile"><div class="lbl">Roles</div><div class="num">14</div><div class="delta up">3 new chunks</div></div>
  <div class="tile"><div class="lbl">Tasks</div><div class="num">7</div><div class="delta muted">2 in review</div></div>
</div>
</body></html>
