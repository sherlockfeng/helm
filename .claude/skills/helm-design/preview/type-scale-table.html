<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  th { font: 600 11px/14px var(--font-sans); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
  td { font: 400 13px/18px var(--font-sans); color: var(--text); }
  td.mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
</style></head>
<body>
<table>
  <thead><tr><th>Token</th><th>Size/Lead</th><th>Weight</th><th>Use</th></tr></thead>
  <tbody>
    <tr><td class="mono">--text-display</td><td class="mono">28 / 32</td><td class="mono">600</td><td>Empty-state titles</td></tr>
    <tr><td class="mono">--text-h1</td><td class="mono">22 / 28</td><td class="mono">600</td><td>Page title</td></tr>
    <tr><td class="mono">--text-h2</td><td class="mono">17 / 22</td><td class="mono">600</td><td>Section title</td></tr>
    <tr><td class="mono">--text-h3</td><td class="mono">13 / 16</td><td class="mono">600 caps</td><td>Sidebar groups</td></tr>
    <tr><td class="mono">--text-body</td><td class="mono">13 / 18</td><td class="mono">400</td><td>Default body</td></tr>
    <tr><td class="mono">--text-caption</td><td class="mono">11 / 14</td><td class="mono">400</td><td>Timestamps, meta</td></tr>
    <tr><td class="mono">--text-mono</td><td class="mono">12 / 16</td><td class="mono">SF Mono</td><td>Paths, IDs, commands</td></tr>
  </tbody>
</table>
</body></html>
